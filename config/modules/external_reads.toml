[ena]
taxon_query = "tax_tree(520)"
timeout_seconds = 180
max_retries = 3
sleep_seconds = 1.0
run_metadata_batch_size = 200

[compatibility]
supported_short_read_platforms = ["ILLUMINA", "DNBSEQ"]
required_library_layout = "PAIRED"
required_library_source = "GENOMIC"
required_library_strategy = "WGS"
required_fastq_files = 2
allow_missing_library_source = true
allow_missing_library_strategy = true

[gapfill]
auto_exclude_globs = [
  "pertussis_data/pertussis_gene/step1_ingest/outputs/bp_targeted_external_raw_reads_plan*.tsv",
  "pertussis_data/pertussis_gene/step1_ingest/outputs/bp_targeted_raw_read_assembly_manifest*.tsv",
  "pertussis_data/pertussis_gene/step1_ingest/outputs/bp_raw_read_assembly_qc_pass*.tsv",
]
auto_exclude_files = [
  "pertussis_data/pertussis_gene/step4_prn_validation/inputs/bp_raw_reads_download_plan.tsv",
  "pertussis_data/pertussis_gene/workflow/reads_plan/reads_download_plan.tsv",
]

[download_plan]
selection_metric = "largest_estimated_total_bytes"

[[targeted.targets]]
label = "JPN_historical_1982_2014"
country_iso3 = "JPN"
country_name = "Japan"
study_accession = "PRJEB18624"
max_per_year = 1
max_samples = 12
sort_mode = "smallest_bytes"

